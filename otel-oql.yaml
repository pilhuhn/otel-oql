# OTEL-OQL Configuration File
# This file can be used instead of command-line flags
# Command-line flags will override these settings if provided

# Pinot configuration
pinot_url: "http://localhost:9000"

# Kafka configuration (external Kafka via compose)
kafka_brokers: "localhost:9092"

# OTLP receiver ports
otlp_grpc_port: 4317
otlp_http_port: 4318

# Query API port
query_api_port: 8080

# Test mode (set to true to use tenant-id=0 as default)
test_mode: true

# Observability configuration (self-instrumentation)
# Enable this to send traces and metrics about the OTEL-OQL service itself
observability_enabled: false  # Set to true to enable self-observability
observability_endpoint: "localhost:4317"  # OTLP gRPC endpoint for self-observability
observability_tenant_id: "0"  # Tenant ID for self-observability data
